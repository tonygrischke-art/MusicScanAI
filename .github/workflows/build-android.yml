name: Build MusicScanAI Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tee build_output.txt; exit ${PIPESTATUS[0]}

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MusicScanAI-Debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: android/build_output.txt
        retention-days: 7
