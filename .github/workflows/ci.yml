name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Typecheck
      run: npx tsc --noEmit

    - name: Lint
      run: npm run lint --if-present

  jest:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Run Jest tests
      run: npx jest --passWithNoTests --forceExit --coverage

    - name: Upload coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jest-coverage
        path: coverage/
        retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [lint-typecheck, jest]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Grant gradlew execute permission
      run: chmod +x android/gradlew

    - name: Build debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MusicScanAI-Debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30